name: Build and Upload Installer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Print Working Directory
      run: pwd

    - name: List Initial Directory Structure
      run: dir

    - name: Build Solution using MSBuild
      run: msbuild D:\a\atlas-toolbox\atlas-toolbox\AtlasToolbox-WinUI3.sln /p:Configuration=Release /p:Platform="x64"

    # Use dotnet publish to get the output files
    - name: Publish Application
      run: dotnet publish D:\a\atlas-toolbox\atlas-toolbox\AtlasToolbox\AtlasToolbox-WinUI3.sln --configuration Release --output "D:\a\atlas-toolbox\atlas-toolbox\Deploy\src"

    - name: List Published Files
      run: dir "D:\a\atlas-toolbox\atlas-toolbox\Deploy\src"

    - name: Build IsWiX Installer
      run: dotnet build D:\a\atlas-toolbox\atlas-toolbox\Installer\wixproj.wixproj --configuration Release -p:MSIProductVersion=1.0.0.0 --output "D:\a\atlas-toolbox\atlas-toolbox\artifacts\"

    - name: List Directory Structure After Build
      run: dir "D:\a\atlas-toolbox\atlas-toolbox\artifacts\"

    - name: Create ZIP of MSI
      run: powershell Compress-Archive -Path "D:\a\atlas-toolbox\atlas-toolbox\artifacts\*" -DestinationPath "D:\a\atlas-toolbox\atlas-toolbox\AtlasToolbox.zip"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AtlasToolbox
        path: D:\a\atlas-toolbox\atlas-toolbox\AtlasToolbox.zip
